name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_API: cicosts-prod-api
  LAMBDA_FUNCTION_WORKERS: cicosts-prod-workers

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "Tests completed"
        env:
          ENVIRONMENT: test
          DATABASE_URL: ""
          GITHUB_CLIENT_ID: test
          GITHUB_APP_ID: test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies to package directory
        run: |
          pip install -r requirements.txt -t package-py311/ --upgrade
          cp -r app package-py311/
          cp handler.py package-py311/
          cp workers.py package-py311/

      - name: Create Lambda deployment package
        run: |
          cd package-py311
          zip -r ../lambda.zip . -x "*.pyc" -x "__pycache__/*" -x "*.git*" -x "tests/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda.zip
          retention-days: 5

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_API }} \
            --zip-file fileb://lambda.zip \
            --publish

      - name: Deploy Workers Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_WORKERS }} \
            --zip-file fileb://lambda.zip \
            --publish

      - name: Wait for API Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_API }}

      - name: Wait for Workers Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_WORKERS }}

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **API Lambda**: ${{ env.LAMBDA_FUNCTION_API }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workers Lambda**: ${{ env.LAMBDA_FUNCTION_WORKERS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
